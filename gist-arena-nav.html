<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GistArena247 — Play &amp; Win Today</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0b0b10;
    --panel: #16161f;
    --panel-2: #1d1d29;
    --hairline: #2a2a38;
    --text: #ecebf2;
    --muted: #8f8fa3;
    --gold-1: #f6d36a;
    --gold-2: #c9982e;
    --daily: #6ee7b7;
    --trivia: #7dd3fc;
    --auction: #f5a3c7;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 500px at 15% -10%, rgba(246,211,106,0.08), transparent 60%),
      radial-gradient(900px 400px at 90% 0%, rgba(125,211,252,0.06), transparent 55%),
      var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }
  h1,h2,h3,.display{font-family:'Space Grotesk',sans-serif;}

  /* ---------- shared top chrome ---------- */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 22px;
  }
  .back-btn{
    display:inline-flex;align-items:center;gap:8px;
    background:transparent;border:1px solid var(--hairline);
    color:var(--text);font-family:'Inter',sans-serif;font-weight:600;
    font-size:14px;padding:9px 16px;border-radius:999px;
    cursor:pointer;transition:border-color .15s ease, transform .15s ease;
  }
  .back-btn:hover{border-color:var(--gold-2);transform:translateX(-2px);}
  .back-btn:focus-visible, .game-card:focus-visible, .play-btn:focus-visible{
    outline:2px solid var(--gold-1);outline-offset:3px;
  }
  .balance-badge{
    display:inline-flex;align-items:center;gap:8px;
    background:var(--panel-2);border:1px solid var(--hairline);
    padding:9px 16px;border-radius:999px;font-size:14px;font-weight:600;
    letter-spacing:.2px;
  }
  .balance-badge .amt{
    background:linear-gradient(135deg,var(--gold-1),var(--gold-2));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }

  /* ---------- view switching ---------- */
  .view{display:none;}
  .view.active{display:block;}

  /* ---------- PLAY & WIN section ---------- */
  #view-home{padding:8px 24px 60px;max-width:1040px;margin:0 auto;}
  .section-head{margin:30px 0 26px;}
  .eyebrow{
    font-size:12px;letter-spacing:2.5px;color:var(--gold-1);
    font-weight:600;text-transform:uppercase;
  }
  .section-head h1{
    font-size:clamp(28px,4vw,40px);margin:8px 0 0;font-weight:700;
    background:linear-gradient(135deg,#fff, #b9b9c9);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }

  .card-grid{
    display:grid;grid-template-columns:repeat(3,1fr);gap:20px;
  }
  @media (max-width:860px){ .card-grid{grid-template-columns:1fr;} }

  .game-card{
    --accent: var(--gold-1);
    position:relative;
    text-align:left;background:var(--panel);
    border:1px solid var(--hairline);border-radius:18px;
    padding:24px 22px 22px;cursor:pointer;
    color:var(--text);font-family:inherit;
    transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    display:flex;flex-direction:column;gap:14px;min-height:190px;
  }
  .game-card::before{
    content:"";position:absolute;inset:0;border-radius:18px;padding:1px;
    background:linear-gradient(135deg,var(--accent),transparent 45%);
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;
    opacity:0;transition:opacity .18s ease;
  }
  .game-card:hover, .game-card:focus-visible{
    transform:translateY(-4px);
    box-shadow:0 16px 34px -18px rgba(0,0,0,.7);
  }
  .game-card:hover::before{opacity:1;}
  .card-icon{
    width:44px;height:44px;border-radius:12px;display:flex;
    align-items:center;justify-content:center;font-size:20px;
    background:color-mix(in srgb, var(--accent) 18%, transparent);
    color:var(--accent);
  }
  .game-card h3{margin:0;font-size:19px;}
  .game-card p{margin:0;color:var(--muted);font-size:13.5px;line-height:1.5;flex:1;}
  .card-cta{
    font-size:13px;font-weight:600;color:var(--accent);
    display:flex;align-items:center;gap:6px;
  }
  .card-cta .arrow{transition:transform .18s ease;}
  .game-card:hover .card-cta .arrow{transform:translateX(3px);}

  #card-daily{--accent:var(--daily);}
  #card-trivia{--accent:var(--trivia);}
  #card-auction{--accent:var(--auction);}

  /* ---------- rules page ---------- */
  .rules-view{max-width:640px;margin:0 auto;padding:6px 24px 60px;}
  .rules-hero{
    border-radius:20px;padding:30px 26px;margin-top:8px;
    border:1px solid var(--hairline);
    background:linear-gradient(160deg, var(--panel-2), var(--panel));
  }
  .rules-hero .card-icon{margin-bottom:14px;}
  .rules-hero h2{font-size:26px;margin:0 0 6px;}
  .rules-hero .tag{color:var(--muted);font-size:13.5px;margin:0;}

  .rules-list{
    list-style:none;margin:26px 0 0;padding:0;
    display:flex;flex-direction:column;gap:16px;
  }
  .rules-list li{
    display:flex;gap:14px;background:var(--panel);
    border:1px solid var(--hairline);border-radius:14px;
    padding:16px 16px 16px 14px;
  }
  .rules-list .num{
    flex:none;width:26px;height:26px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:12.5px;font-weight:700;
    background:linear-gradient(135deg,var(--gold-1),var(--gold-2));
    color:#20180a;
  }
  .rules-list p{margin:0;font-size:14.5px;line-height:1.6;color:#d8d8e2;}

  .play-btn{
    margin-top:28px;width:100%;border:none;border-radius:14px;
    padding:16px 18px;font-family:'Space Grotesk',sans-serif;
    font-size:16px;font-weight:600;cursor:pointer;
    background:linear-gradient(135deg,var(--gold-1),var(--gold-2));
    color:#20180a;transition:transform .15s ease, box-shadow .15s ease;
  }
  .play-btn:hover{transform:translateY(-2px);box-shadow:0 14px 26px -14px rgba(246,211,106,.55);}

  @media (prefers-reduced-motion: reduce){
    .game-card, .back-btn, .play-btn{transition:none;}
  }
</style>
</head>
<body>

<!-- ============ HOME: PLAY & WIN TODAY ============ -->
<div id="view-home" class="view active">
  <div class="topbar">
    <span class="eyebrow" style="align-self:center;">GistArena247</span>
    <div class="balance-badge">🎁 Reward Credit: <span class="amt">₦0.00</span></div>
  </div>

  <div class="section-head">
    <div class="eyebrow">Today's lineup</div>
    <h1>Play &amp; Win Today</h1>
  </div>

  <div class="card-grid">
    <button class="game-card" id="card-daily" data-game="daily" aria-label="Open Daily Streak rules">
      <div class="card-icon">🔥</div>
      <h3>Daily Streak</h3>
      <p>Log in every day to build your streak and climb the wallet multiplier tiers.</p>
      <span class="card-cta">View rules <span class="arrow">→</span></span>
    </button>

    <button class="game-card" id="card-trivia" data-game="trivia" aria-label="Open Live Trivia rules">
      <div class="card-icon">🧠</div>
      <h3>Live Trivia</h3>
      <p>Race the clock on tonight's local news questions for a shot at the jackpot.</p>
      <span class="card-cta">View rules <span class="arrow">→</span></span>
    </button>

    <button class="game-card" id="card-auction" data-game="auction" aria-label="Open Reverse Auctions rules">
      <div class="card-icon">🏷️</div>
      <h3>Reverse Auctions</h3>
      <p>Bid low, bid unique — the lowest un-duplicated number takes the item.</p>
      <span class="card-cta">View rules <span class="arrow">→</span></span>
    </button>
  </div>
</div>

<!-- ============ RULES PAGE TEMPLATE (shared) ============ -->
<div id="view-rules" class="view">
  <div class="topbar">
    <button class="back-btn" id="back-btn">⬅ Back to Gist</button>
    <div class="balance-badge">🎁 Reward Credit: <span class="amt">₦0.00</span></div>
  </div>

  <div class="rules-view">
    <div class="rules-hero">
      <div class="card-icon" id="rules-icon" style="font-size:22px;">🔥</div>
      <h2 id="rules-title">Daily Streak</h2>
      <p class="tag" id="rules-tag">How this game works</p>

      <ol class="rules-list" id="rules-list"><!-- injected --></ol>

      <button class="play-btn" id="rules-play-btn">Play Daily Streak</button>
    </div>
  </div>
</div>

<script>
  /**
   * Reward ledger model
   * ---------------------------------------------------------
   * This is NOT a stored-value / deposit wallet. Users cannot
   * add real money to it. Every ₦ shown here represents ad-funded
   * reward credit earned through in-app activity (streaks, reading,
   * trivia, auctions). Treat `rewardLedger.balance` as a points-style
   * ledger, not a payment account.
   */
  const rewardLedger = {
    balance: 0,          // ₦ of earned, ad-funded reward credit
    source: "ad_revenue_share", // funded by AdSense/AdMob impressions
    depositsEnabled: false      // real-money deposits are not supported
  };

  const RULES = {
    daily: {
      title: "Daily Streak",
      icon: "🔥",
      accent: "var(--daily)",
      tag: "Build your streak, grow your multiplier",
      points: [
        "Log into GistArena247 every single day to automatically build up your activity streak tracking calendar.",
        "Staying consistent unlocks multiplier tiers that grow your daily wallet earnings from ₦10.00 all the way up to ₦20.00 cash per day.",
        "If you miss a single calendar day, your streak multiplier resets to zero, so check back daily to protect your balance!"
      ]
    },
    trivia: {
      title: "Live Trivia",
      icon: "🧠",
      accent: "var(--trivia)",
      tag: "Answer fast, answer right",
      points: [
        "Join the live countdown before 8:00 PM daily. Entry uses ₦15.00 of the reward credit you've already earned by staying active — never real cash.",
        "Answer 10 rapid-fire questions based strictly on the hyperlocal news articles and traffic updates published across GistArena247 earlier today.",
        "Every player who achieves a perfect 10/10 scorecard instantly splits that night's Guaranteed Daily Match Jackpot directly into their app wallet!"
      ]
    },
    auction: {
      title: "Reverse Auctions",
      icon: "🏷️",
      accent: "var(--auction)",
      tag: "Lowest unique bid wins",
      points: [
        "Browse premium marketplace items and lock in a strategic price bid using just ₦10.00 of your earned reward credit.",
        "To win the item, your bid must be the single lowest numerical number that absolutely zero other players on the platform duplicated.",
        "Duplicated numbers are completely eliminated from the board, allowing you to walk away with high-end tools or electronics for pennies!"
      ]
    }
  };

  const viewHome = document.getElementById('view-home');
  const viewRules = document.getElementById('view-rules');
  const rulesIcon = document.getElementById('rules-icon');
  const rulesTitle = document.getElementById('rules-title');
  const rulesTag = document.getElementById('rules-tag');
  const rulesList = document.getElementById('rules-list');
  const rulesPlayBtn = document.getElementById('rules-play-btn');
  const rulesHero = document.querySelector('.rules-hero');

  function openRules(gameKey){
    const data = RULES[gameKey];
    if(!data) return;

    rulesIcon.textContent = data.icon;
    rulesIcon.style.background = `color-mix(in srgb, ${data.accent} 18%, transparent)`;
    rulesIcon.style.color = data.accent;
    rulesTitle.textContent = data.title;
    rulesTag.textContent = data.tag;
    rulesPlayBtn.textContent = `Play ${data.title}`;

    rulesList.innerHTML = data.points.map((p, i) => `
      <li>
        <span class="num">${i+1}</span>
        <p>${p}</p>
      </li>
    `).join('');

    viewHome.classList.remove('active');
    viewRules.classList.add('active');
    window.scrollTo({top:0, behavior:'instant'});
    history.pushState({game:gameKey}, '', `#${gameKey}`);
  }

  function goHome(){
    viewRules.classList.remove('active');
    viewHome.classList.add('active');
    window.scrollTo({top:0, behavior:'instant'});
    history.pushState({}, '', '#');
  }

  document.querySelectorAll('.game-card').forEach(card=>{
    card.addEventListener('click', ()=> openRules(card.dataset.game));
  });

  document.getElementById('back-btn').addEventListener('click', goHome);

  window.addEventListener('popstate', (e)=>{
    const g = (location.hash || '').replace('#','');
    if(g && RULES[g]) openRules(g); else goHome();
  });

  // deep-link support: load directly into a rules page via #daily / #trivia / #auction
  (function initFromHash(){
    const g = (location.hash || '').replace('#','');
    if(g && RULES[g]) openRules(g);
  })();
</script>
</body>
</html>
